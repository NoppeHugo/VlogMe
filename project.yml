name: VlogMe
options:
  bundleIdPrefix: com.hugonoppe
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"          # mode langage 5 (compilé par le compilateur Swift 6) — voir README
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO

targets:
  VlogMe:
    type: application
    platform: iOS
    sources:
      - path: VlogMe
    settings:
      base:
        INFOPLIST_FILE: VlogMe/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hugonoppe.vlogme
        TARGETED_DEVICE_FAMILY: "1"           # iPhone uniquement
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        # DEVELOPMENT_TEAM: XXXXXXXXXX        # ← renseigne ton Team ID, ou laisse Xcode gérer la signature auto
    entitlements:
      path: VlogMe/Resources/VlogMe.entitlements
      properties:
        com.apple.developer.in-app-payments:
          - com.hugonoppe.vlogme.pro.monthly
          - com.hugonoppe.vlogme.pro.annual
  VlogMeWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: VlogMeWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hugonoppe.vlogme.widget
        INFOPLIST_FILE: VlogMeWidgetExtension/Info.plist
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO
        SKIP_INSTALL: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

  VlogMeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VlogMeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hugonoppe.vlogme.tests
    dependencies:
      - target: VlogMe
